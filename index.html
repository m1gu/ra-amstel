<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amstel AR Demo</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- MindAR and Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

    <!-- Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>

<body>
    <!-- AR Container -->
    <div id="ar-container"></div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <div id="loading-screen" class="overlay-screen">
            <div class="loader"></div>
            <p>Preparando experiencia AR...</p>
        </div>

        <div id="scan-hint" class="overlay-screen hidden">
            <p>Escanea la imagen de Amstel</p>
            <div class="scan-frame"></div>
        </div>

        <div id="ui-controls" class="hidden">
            <button id="reset-btn">🔄 Reiniciar</button>
            <button id="audio-toggle">🔊</button>
        </div>
    </div>

    <!-- Main Logic -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
